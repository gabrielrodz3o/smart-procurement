services:

  purchasing-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: purchasing-ai
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      # ── App ────────────────────────────────────────────────────────────────
      - ENVIRONMENT=production
      # ── Database (override .env for Docker networking) ────────────────────
      - DB_HOST=${DB_HOST:-pgbouncer}
      - DB_PORT=${DB_PORT:-6432}
      - DB_DATABASE=${DB_DATABASE:-gcode}
      - DB_USER=${DB_USER:-dev_gabriel}
      - DB_PASSWORD=${DB_PASSWORD}
      # ── OpenAI ────────────────────────────────────────────────────────────
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # ── Redis cache (optional — falls back to in-memory if not set) ───────
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      # ── Nightly scheduler ─────────────────────────────────────────────────
      # Format: business_unit_id:location_id comma-separated
      # Example: NIGHTLY_UNITS=16:12,17:15
      - NIGHTLY_UNITS=${NIGHTLY_UNITS:-}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - purchasing-net
      - db-net          # external network where pgbouncer lives

  redis:
    image: redis:7-alpine
    container_name: purchasing-ai-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"     # 6380 on host to avoid conflicts with existing Redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - purchasing-net

networks:
  purchasing-net:
    driver: bridge
  db-net:
    external: true       # attach to your existing pgbouncer/postgres network
    name: app-network
