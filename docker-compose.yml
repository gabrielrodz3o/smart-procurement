services:

  purchasing-ai:
    build:
      context: ./services/purchasing-ai
      dockerfile: Dockerfile
    container_name: purchasing-ai
    ports:
      - "8001:8001"
    env_file:
      - ./services/purchasing-ai/.env
    environment:
      - ENVIRONMENT=production
      - DB_HOST=${DB_HOST:-pgbouncer}
      - DB_PORT=${DB_PORT:-6432}
      - DB_DATABASE=${DB_DATABASE:-gcode}
      - DB_USER=${DB_USER:-dev_gabriel}
      - DB_PASSWORD=${DB_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - NIGHTLY_UNITS=${NIGHTLY_UNITS:-}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - purchasing-net
      - app-network

  redis:
    image: redis:7-alpine
    container_name: purchasing-ai-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - purchasing-net

networks:
  purchasing-net:
    driver: bridge
  app-network:
    external: true
